name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Create .env file for build
        run: |
          echo "VITE_SUPABASE_URL=https://khoamgawjlsrdbcchxiy.supabase.co" > .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_K2h-TBdOcEHdgCZsRvKbNQ_SEJrx11S" >> .env
          echo "SUPABASE_URL=https://khoamgawjlsrdbcchxiy.supabase.co" >> .env
          echo "SUPABASE_PUBLISHABLE_KEY=sb_publishable_K2h-TBdOcEHdgCZsRvKbNQ_SEJrx11S" >> .env

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
